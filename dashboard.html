<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTC ACADEMY | Dashboard Cyberpunk</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS GERAIS (HACKER/CYBERPUNK) --- */
        :root {
            --bg-dark: #090913;
            --bg-panel: #111124;
            --primary: #4cc9f0; /* Ciano Neon */
            --secondary: #f72585; /* Rosa Neon */
            --text-main: #e0e0f0;
            --text-muted: #8888b0;
            --shadow-glow: 0 0 15px rgba(76, 201, 240, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a3a 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(76, 201, 240, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de borda luminosa sutil */
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            border-radius: 22px;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.3;
        }

        /* --- MENU DE NAVEGAÇÃO --- */
        .nav-menu {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-menu button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.3s ease;
        }

        .nav-menu button i { font-size: 18px; }

        .nav-menu button:hover, .nav-menu button.active {
            color: var(--primary);
            text-shadow: var(--shadow-glow);
        }

        .nav-menu button.logout { color: #ff4d4d; }
        .nav-menu button.logout:hover { color: #ff8080; text-shadow: 0 0 10px rgba(255, 77, 77, 0.6); }

        /* --- SEÇÕES E TÍTULOS --- */
        h2 {
            font-size: 18px;
            color: var(--text-main);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-left: 3px solid var(--secondary);
            padding-left: 10px;
        }

        #homeSection, #adminSection { display: none; animation: fadeIn 0.5s ease; }
        #homeSection.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- LISTA DE CURSOS (VISUAL DO ALUNO) --- */
        #listaCursos { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        #listaCursos::-webkit-scrollbar { width: 5px; }
        #listaCursos::-webkit-scrollbar-thumb { background: var(--bg-dark); border-radius: 5px; }

        .course-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .course-card:hover { background: rgba(255, 255, 255, 0.07); border-color: rgba(76, 201, 240, 0.3); }

        .course-card h3 { font-size: 15px; color: var(--text-main); font-weight: 500; }
        .course-card .btn-watch {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        .course-card .btn-watch:hover { background: var(--primary); color: var(--bg-dark); box-shadow: var(--shadow-glow); }

        /* --- PAINEL ADMIN --- */
        .admin-section {
            background: rgba(247, 37, 133, 0.05); /* Fundo sutil rosa */
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(247, 37, 133, 0.3);
        }

        .admin-section.active { display: block !important; }

        .input-group { margin-bottom: 12px; position: relative; }
        .input-group i { position: absolute; left: 12px; top: 12px; color: var(--text-muted); font-size: 14px; }

        input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--bg-dark);
            color: var(--text-main);
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(76, 201, 240, 0.3); }

        .btn-add {
            background: linear-gradient(90deg, var(--secondary), #bc1d65);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            transition: 0.3s ease;
        }

        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(247, 37, 133, 0.4); }

    </style>
</head>
<body>

    <div class="container">
        <nav class="nav-menu">
            <button onclick="showSection('home')" class="active" id="homeTab">
                <i class="fas fa-th-list"></i>Cursos
            </button>
            
            <button id="adminTab" style="display: none;" onclick="showSection('admin')">
                <i class="fas fa-user-shield"></i>Admin
            </button>
            
            <button id="logoutBtn" class="logout">
                <i class="fas fa-sign-out-alt"></i>Sair
            </button>
        </nav>

        <section id="homeSection" class="active">
            <h2><i class="fas fa-graduation-cap"></i> Portal do Aluno</h2>
            <div id="listaCursos">
                <p style="text-align: center; color: var(--text-muted);">Carregando biblioteca...</p>
            </div>
        </section>

        <section id="adminSection" class="admin-section">
            <h2><i class="fas fa-plus-circle"></i> Novo Conteúdo</h2>
            
            <div class="input-group">
                <i class="fas fa-tag"></i>
                <input type="text" id="courseName" placeholder="Nome do Curso/Módulo">
            </div>
            
            <div class="input-group">
                <i class="fas fa-link"></i>
                <input type="text" id="courseLink" placeholder="Link Seguro da Aula (URL)">
            </div>
            
            <button class="btn-add" id="saveCourse">
                <i class="fas fa-cloud-upload-alt"></i> Publicar no Portal
            </button>
        </section>
    </div>

    <script type="module">
        // Importações do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Sua Configuração Atual (Não mudei)
        const firebaseConfig = {
            apiKey: "AIzaSyDFyFLD_IZO2WxQiaatsX0FCflWSXc66_4",
            authDomain: "htc-16a4f.firebaseapp.com",
            projectId: "htc-16a4f",
            storageBucket: "htc-16a4f.appspot.com",
            messagingSenderId: "309059583259",
            appId: "1:309059583259:web:d6461faf733f5995e4a7be"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- LÓGICA DE LOGIN E PERMISSÃO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Acesso autorizado:", user.email);
                
                // MUDANÇA IMPORTANTE AQUI:
                // Verificamos se o e-mail logado é exatamente o seu.
                // Substitua "htc.storepj1@gmail.com" pelo seu e-mail real.
                if (user.email === "htc.storepj1@gmail.com") {
                    console.log("Admin detectado.");
                    // Se for você, o menu e a seção de admin aparecem.
                    document.getElementById("adminTab").style.display = "flex";
                }
                
                // Qualquer email logado carregar os cursos (seção Home)
                carregarCursos();
            } else {
                // Se não estiver logado, volta pro login
                window.location.href = "index.html";
            }
        });

        // --- FUNÇÕES DE ADMIN ---
        document.getElementById("saveCourse").addEventListener("click", async () => {
            const name = document.getElementById("courseName").value;
            const link = document.getElementById("courseLink").value;

            if (name && link) {
                try {
                    await addDoc(collection(db, "cursos"), {
                        nome: name,
                        url: link,
                        data: new Date()
                    });
                    alert("Sucesso! O curso foi publicado.");
                    // Limpa os campos
                    document.getElementById("courseName").value = '';
                    document.getElementById("courseLink").value = '';
                    carregarCursos(); // Atualiza a lista
                } catch (e) {
                    alert("Erro ao salvar: " + e);
                }
            } else {
                alert("Preencha todos os campos, Admin!");
            }
        });

        // --- FUNÇÕES DE EXIBIÇÃO ---
        async function carregarCursos() {
            const listaCursos = document.getElementById("listaCursos");
            listaCursos.innerHTML = `<p style="text-align: center; color: var(--text-muted);">Acessando rede...</p>`;

            // Busca cursos ordenados pela data mais nova
            const cursosRef = collection(db, "cursos");
            const q = query(cursosRef, orderBy("data", "desc"));
            const querySnapshot = await getDocs(q);
            
            listaCursos.innerHTML = ""; // Limpa o carregando

            if (querySnapshot.empty) {
                listaCursos.innerHTML = `<p style="text-align: center; color: var(--text-muted);">Nenhum curso liberado ainda.</p>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const curso = doc.data();
                listaCursos.innerHTML += `
                    <div class="course-card">
                        <h3><i class="fas fa-play-circle" style="color: var(--secondary); margin-right: 8px;"></i>${curso.nome}</h3>
                        <a href="${curso.url}" target="_blank" class="btn-watch">Assistir</a>
                    </div>
                `;
            });
        }

        // --- NAVEGAÇÃO ENTRE ABAS ---
        window.showSection = (section) => {
            // Remove active de tudo
            document.getElementById("homeSection").classList.remove('active');
            document.getElementById("adminSection").classList.remove('active');
            document.getElementById("homeTab").classList.remove('active');
            document.getElementById("adminTab").classList.remove('active');

            if (section === 'home') {
                document.getElementById("homeSection").classList.add('active');
                document.getElementById("homeTab").classList.add('active');
            } else if (section === 'admin') {
                document.getElementById("adminSection").classList.add('active');
                document.getElementById("adminTab").classList.add('active');
            }
        };

        // --- LOGOUT ---
        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });

    </script>
</body>
</html>
