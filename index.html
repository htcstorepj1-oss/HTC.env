<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Segurança: CSP restritivo para prevenir XSS e injeções -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob: data: https://cdn.jsdelivr.net https://*.m3u8 https://*.ts; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
    <title>CyberStream IPTV - Ultra High Performance</title>
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js para suporte a streams .m3u8 moderno -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">Cyber<span>Stream</span></div>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Buscar canal ou categoria..." aria-label="Buscar">
                <input type="url" id="m3uUrl" placeholder="URL da lista M3U">
                <label class="file-btn">
                    Upload M3U
                    <input type="file" id="fileInput" accept=".m3u,.m3u8" hidden>
                </label>
                <button id="loadBtn" class="primary-btn">Carregar</button>
            </div>
        </header>

        <nav id="categoryBar" class="category-nav">
            <!-- Categorias geradas dinamicamente -->
        </nav>

        <main class="content-grid">
            <section class="player-section">
                <div class="video-container">
                    <video id="mainVideo" controls crossorigin="anonymous" playsinline></video>
                    <div id="videoOverlay" class="hidden">Carregando stream...</div>
                </div>
                <div class="channel-info">
                    <h2 id="currentChannelName">Selecione um canal</h2>
                    <p id="currentChannelGroup">Aguardando lista...</p>
                    <button id="favBtn" class="fav-btn">★ Favoritar</button>
                </div>
            </section>

            <section class="list-section">
                <div id="channelList" class="channel-grid">
                    <!-- Canais renderizados aqui via script -->
                </div>
                <div id="listSentinel"></div> <!-- Para carregamento infinito/lazy load -->
            </section>
        </main>
    </div>
    <script src="script.js" type="module"></script>
</body>
</html>
