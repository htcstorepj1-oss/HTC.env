<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HTC Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <span class="icon">🎓</span>
                <h1>HTC <span>ACADEMY</span></h1>
            </div>
            <p>Bem-vindo de volta! Acesse sua conta para continuar seus estudos.</p>
            
            <button id="loginBtn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" alt="Google">
                Entrar com Google
            </button>

            <footer>
                © 2026 HTC Cursos - Todos os direitos reservados.
            </footer>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
</body>
</html>
